{% extends "base.html" %}
{% block content %}
  
    <div class="container pt-5" >
        <div class="row">
            <div class="titles mb-4 mb-lg-5">
                <h4>Sign in to your Education City Account</h4>
            </div>
            <form id="loginForm" method="POST">
                {% csrf_token %}
                
               
                <div class="row">
                    <div class="col-12">
                        <div class="pills-tab">
                            
                            <div class="tab-content" id="sign-tabContent">
                                <div class="tab-pane fade show active" id="email-tab" role="tabpanel"
                                    aria-labelledby="emailLoginTab">
                                    <div class="form">
                                        <form action="#">
                                            <div class="row">
                                                <div class="col-lg-12">
                                                    <div class="form-group">
                                                        <label>Email Address</label>
                                                        <div class="input-group mb-3"><span
                                                                class="input-group-text" id="basic-addon1"><i
                                                                    class="bi bi-envelope"></i></span>
                                                            <input class="form-control" type="text"
                                                                id="login_email" name="email"
                                                                placeholder=""
                                                                aria-label="Email Address"
                                                                aria-describedby="basic-addon1" value="">
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </form>
                                    </div>
                                </div>

                                <div class="form">
                                    <div class="row">
                                        <div class="col-lg-12">
                                            <div class="form-group">
                                                <label>Password</label>
                                                <div class="input-group input-password"><span
                                                        class="input-group-text" id="basic-addon2"><i
                                                            class="bi bi-lock"></i></span>
                                                    <input class="form-control pass" type="password"
                                                        id="password" name="password" placeholder=""
                                                        aria-label="Password"
                                                        aria-describedby="basic-addon2" value="" />
                                                    <span class="input-group-text toggle-password" id="basic-addon2 "><i class="bi bi-eye" id="password_icon"></i></span>

                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                
                            </div>
                        </div>
                    </div>
                    
                    <div class="col-lg-12">
                        <div class="btn-wrapper">
                            <input  id="login-btn" type="submit">
                        </div>
                    </div>
                </form>
                    <div class="col-lg-12 text-center">
                        <div class="py-5 pb-4">
                            <h6 class="mb-0">Don't have an account? 
                            <a data-bs-toggle="modal" data-bs-target="#reg-modal"  id='registerLink' class="text-secondary" href="/register">Register</a></h6>
                        </div>
                    </div>
                </div>
           
        </div>
    </div>
    <div class="modal-footer text-center">
        <div class="col-lg-12">
            <p class="mb-0">By continuing, you agree to our <br> User Agreement and <a href="https://educationcity.qa/privacy-policy" class="text-secondary">Privacy Policy</a>.</p>
        </div>
    </div>
</div>
</div>
</div>


{% endblock %}
